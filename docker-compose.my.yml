version: "3.8"

services:

  user-api:
    build: ./user-api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/app
    depends_on:
      - mongo

  admin-api:
    build: ./admin-api
    ports:
      - "5001:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/app
    depends_on:
      - mongo

  user-ui:
    build: ./user-ui
    ports:
      - "3000:3000"
    depends_on:
      - user-api

  admin-ui:
    build: ./admin-ui
    ports:
      - "3001:3000"
    depends_on:
      - admin-api

  mongo:
    image: mongo
    ports:
      - "27017:27017"